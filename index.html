<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'nonce-universal-reader-bootstrap'; style-src 'self' 'unsafe-inline'; img-src 'self' data: file: blob:; font-src 'self' data:; connect-src 'self' https: http://localhost:* ws://localhost:*; worker-src 'self' blob:; frame-src 'self' blob:; child-src 'self' blob:; object-src 'none'; base-uri 'none'"
    />
    <script nonce="universal-reader-bootstrap">
      window.addEventListener('error', function (event) {
        if (typeof event.message !== 'string' || event.message.indexOf('ResizeObserver') === -1) return
        event.preventDefault()
        event.stopImmediatePropagation()
      }, true)
      window.addEventListener('unhandledrejection', function (event) {
        var reason = event.reason
        var message = reason && reason.message ? reason.message : String(reason)
        if (typeof message !== 'string' || message.indexOf('ResizeObserver') === -1) return
        event.preventDefault()
        event.stopImmediatePropagation()
      }, true)
    </script>
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>universalreader</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
